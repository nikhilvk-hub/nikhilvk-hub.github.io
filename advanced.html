<!DOCTYPE html>
<html lang="en">
    <head>
        <title>Advanced Search</title>
    </head>
    <body>
        <div style="text-align:right; padding: 15px;">
            <a href="index.html">Google Search</a>
        </div>
        <div style="padding:40px;">
            <h2 style="color:#d93025;">Google Advanced Search</h2>
            <hr>
            <br>
            <form action="https://www.google.com/search">
               <div style="margin-bottom: 15px;">
                <label style="display: inline-block; width: 200px;">All these words:</label>
                <input type="text" name="as_q">
                </div>
                <div style="margin-bottom: 15px;">
                <label style="display: inline-block; width: 200px;">This exact word or phrase:</label>
                <input type="text" name="as_epq">
                </div>
                <div style="margin-bottom: 15px;">
                <label style="display: inline-block; width: 200px;">Any of these words:</label>
                <input type="text" name="as_oq">
                </div>
                <div style="margin-bottom: 15px;">
                    <label style="display: inline-block; width: 200px;">None of these words:</label>
                    <input type="text" name="as_eq">
                </div>
                <br>
                <input type="submit" value="Advanced Search" style="background-color:#357ae8; color:white; border:none; padding:8px 15px; cursor: pointer;">
            </form>
        </div>"
    </body>
</html>
